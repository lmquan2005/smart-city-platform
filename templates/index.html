<!DOCTYPE html>
<html>

<head>

<title>Smart City Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Smart City Weather Dashboard</h2>

<table class="table table-striped">

<thead>

<tr>

<th>City</th>

<th>Temperature</th>

<th>Humidity</th>

<th>Wind Speed</th>

<th>Observation Time</th>

</tr>

</thead>

<tbody>

{% for row in weather %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[1] }} °C</td>

<td>{{ row[2] }} %</td>

<td>{{ row[3] }} km/h</td>

<td>{{ row[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
